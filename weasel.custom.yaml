customization:
  distribution_code_name: Weasel
  distribution_version: 0.17.4
  generator: "Weasel::UIStyleSettings"
  modified_time: "Wed Mar 25 21:14:22 2026"
  rime_version: 1.13.1

patch:
  show_notifications: true  # 是否显示输入法状态通知，改为false可关闭
  show_notifications_time: 100  # 输入法状态通知显示时间，单位毫秒，默认1000ms（1秒），改为100可缩短显示时间

  style:
    horizontal: true  # 横排显示
    inline_preedit: true  # 嵌入编码
    preedit_type: composition  # 嵌入类。有4个选项可设：input 嵌入输入码 | composition 嵌入编码 | preview 嵌入首选项 | preview_all 嵌入全部内容
    color_scheme: MacRoseo
    comment_font_face: "Microsoft Yahei"
    comment_font_point: 11
    display_tray_icon: false
    font_face: "Microsoft Yahei"
    font_point: 12
    label_font_face: "Microsoft Yahei"
    label_font_point: 9  # 标签字体大小
    label_format: "%s"  # 标签格式

    layout: {
      align_type: bottom,  # 候选项、标号、备注的对齐方式：bottom底部对齐，top顶部对齐，center居中对齐
      border_width: 1,
      candidate_spacing: 17,  # 候选项之间的距离
      corner_radius: 8,  # 面板圆角
      round_corner: 5,  # 候选框圆角
      enhanced_position: false,  # 不知
      hilite_padding_x: 7,  # 候选项横向内边距
      hilite_padding_y: 4,  # 候选项纵向内边距
      hilite_spacing: 1,  # 候选项与标号之间的距离
      margin_x: 11,  # 候选的横向外边距
      # margin_x: -1,  # 隐藏候选框
      margin_y: 8,  # 候选的纵向外边距
      shadow_offset_x: 2,
      shadow_offset_y: 2,
      shadow_radius: 3,
      # spacing: 30,  # 拼音与候选项之间的距离
    }


