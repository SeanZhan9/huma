patch:
  style:
    capture_type: none
    color_font: true
    comment_font_face: "Consolas, Segoe UI Emoji, Noto Color Emoji, TumanPUA, LXGW WenKai GB Screen, SimSun, SimSun-ExtB, SimSun-ExtG, TH-Tshyn-P0, TH-Tshyn-P1, TH-Tshyn-P2, TH-Tshyn-P16"
    comment_font_point: 15
    display_tray_icon: false #显示小狼毫图标 
    font_face: "Consolas, Segoe UI Emoji, Noto Color Emoji, LXGW WenKai GB Screen, SimSun, SimSun-ExtB, SimSun-ExtG, TH-Tshyn-P0, TH-Tshyn-P1, TH-Tshyn-P2, TH-Tshyn-P16"
    font_point: 15
    fullscreen: false
    inline_preedit: true
    label_font_face: "LXGW WenKai GB Screen, SimSun, SimSun-ExtB, SimSun-ExtG, TH-Tshyn-P0, TH-Tshyn-P1, TH-Tshyn-P2, TH-Tshyn-P16"
    label_font_point: 15
    label_format: "%s."

    
    mark_text: ""
    preedit_type: input  # preedit显示在输入法界面上，还是直接显示在输入框里
    vertical_auto_reverse: true
    color_scheme: win11light

    layout: {
      align_type: center,
      border_width: 0,
      border_height: 0,
      candidate_spacing: 4,  # 候选项之间的间距
      corner_radius: 9,  # 面版圆角
      hilite_padding: 2,
      hilite_spacing: 5,
      line_spacing: 8,
      margin_x: 5,
      margin_y: 5,
      min_height: 0,
      min_width: 75,
      round_corner: 6,  # 候选项圆角
      shadow_offset_x: 1,
      shadow_offset_y: 1,
      shadow_radius: 2,
      enhanced_position: bool
    }

  preset_color_schemes:
